name: Build Thesis

on:
  push:
    branches:
      - main
    tags:
      - "**"
  pull_request:
  schedule:
    - cron: '0 16 * * 1'  # Build every monday, 16:00

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install texlive
      uses: zauguin/install-texlive@v3
      with:
        packages: >
          scheme-basic
          collection-luatex
          collection-latexrecommended
          collection-latexextra
          collection-fontsrecommended
          collection-fontsextra
          collection-mathscience
          collection-bibtexextra
          biber
          biblatex
          latexmk
          lualatex-math
          fontspec
          microtype
          unicode-math
          physics
          chemformula
          xfrac
          acronym
          pdfpages
          cprotect
          placeins
          extdash
          scrhack

    - name: Build document
      run: |
        latexmk
