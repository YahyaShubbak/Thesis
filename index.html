<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thesis Dashboard — Traveling Wave Magnetophoresis</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
        /* ================================================================
           DARK THEME — Cookie Clicker meets Academia
           ================================================================ */
        :root {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --plot-bg: #0f3460;
            --text: #e0e0e0;
            --text-muted: #8899aa;
            --accent: #e94560;
            --accent2: #0fa3b1;
            --green: #4ecca3;
            --red: #e94560;
            --gold: #ffd700;
            --bronze: #cd7f32;
            --silver: #c0c0c0;
            --diamond: #b9f2ff;
            --mythic: #ff6ec7;
            --transcendent: #ff4500;
            --border: rgba(255,255,255,0.08);
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #16213e 0%, #1a1a2e 50%, #0f3460 100%);
            padding: 2rem;
            text-align: center;
            border-bottom: 2px solid var(--accent);
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(233,69,96,0.15) 0%, transparent 60%);
            pointer-events: none;
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text);
            position: relative;
        }
        .header h1 span { color: var(--accent); }
        .header .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.3rem;
            position: relative;
        }
        .header .generated {
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-top: 0.5rem;
            position: relative;
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            padding: 1.2rem 2rem;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
        }
        .stat-item {
            text-align: center;
            min-width: 100px;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--green);
        }
        .stat-value.accent { color: var(--accent); }
        .stat-value.gold { color: var(--gold); }
        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        /* Progress bar */
        .progress-section {
            padding: 1rem 2rem;
            background: var(--bg);
        }
        .progress-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .progress-title {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .progress-pct {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--green);
        }
        .progress-bar-bg {
            height: 8px;
            background: var(--plot-bg);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--green));
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        /* Main grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            padding: 1rem 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }
        .chart-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 0.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .chart-card.full-width {
            grid-column: 1 / -1;
        }
        .chart-card.third-width {
            /* For gauge + heatmap side by side */
        }

        /* Plotly responsive */
        .chart-card .js-plotly-plot, .chart-card .plotly {
            width: 100% !important;
        }

        /* Achievement section */
        .achievements-section {
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }
        .achievements-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .achievements-title {
            font-size: 1.3rem;
            font-weight: 700;
        }
        .achievements-title span { color: var(--gold); }
        .achievements-count {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .achievements-count strong {
            color: var(--green);
            font-size: 1.1rem;
        }

        /* Category filter buttons */
        .category-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1rem;
        }
        .filter-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--accent);
            color: var(--text);
            background: rgba(233, 69, 96, 0.15);
        }

        /* Achievement grid */
        .achievement-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.8rem;
        }

        .achievement-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 1rem;
            border: 2px solid var(--border);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .achievement-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--border);
        }
        .achievement-card.unlocked::before {
            background: var(--tier-color, var(--bronze));
        }
        .achievement-card.locked {
            opacity: 0.45;
            border-color: rgba(255, 255, 255, 0.03);
        }
        .achievement-card.locked:hover {
            opacity: 0.6;
            border-color: rgba(255, 255, 255, 0.08);
        }
        .achievement-card.locked .ach-emoji {
            font-size: 2.2rem;
            color: var(--text-muted);
            opacity: 0.5;
            font-style: normal;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            font-weight: 700;
        }
        .achievement-card.locked .ach-name {
            color: var(--text-muted);
            opacity: 0.6;
        }
        .achievement-card.locked .ach-desc {
            opacity: 0.5;
            font-style: italic;
        }
        .ach-secret-label {
            font-size: 0.55rem;
            color: var(--gold);
            opacity: 0.5;
            margin-top: 0.3rem;
        }
        .achievement-card.unlocked:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border-color: var(--tier-color, var(--bronze));
        }
        .achievement-card.unlocked.bronze { --tier-color: var(--bronze); }
        .achievement-card.unlocked.silver { --tier-color: var(--silver); }
        .achievement-card.unlocked.gold { --tier-color: var(--gold); }
        .achievement-card.unlocked.diamond { --tier-color: var(--diamond); }
        .achievement-card.unlocked.mythic { --tier-color: var(--mythic); }
        .achievement-card.unlocked.transcendent { --tier-color: var(--transcendent); }

        /* Glow effect for diamond */
        .achievement-card.unlocked.diamond {
            animation: diamond-glow 3s ease-in-out infinite alternate;
        }
        @keyframes diamond-glow {
            from { box-shadow: 0 0 5px rgba(185, 242, 255, 0.2); }
            to { box-shadow: 0 0 20px rgba(185, 242, 255, 0.4); }
        }

        /* Mythic: pulsing pink glow */
        .achievement-card.unlocked.mythic {
            animation: mythic-glow 2.5s ease-in-out infinite alternate;
        }
        @keyframes mythic-glow {
            from { box-shadow: 0 0 8px rgba(255, 110, 199, 0.3); }
            to { box-shadow: 0 0 25px rgba(255, 110, 199, 0.6); }
        }

        /* Transcendent: fiery rainbow shimmer */
        .achievement-card.unlocked.transcendent {
            animation: transcendent-glow 2s ease-in-out infinite alternate;
            background: linear-gradient(135deg, rgba(255,69,0,0.15), rgba(255,215,0,0.1), rgba(255,69,0,0.15));
        }
        @keyframes transcendent-glow {
            from { box-shadow: 0 0 10px rgba(255, 69, 0, 0.4), 0 0 20px rgba(255, 215, 0, 0.2); }
            to { box-shadow: 0 0 30px rgba(255, 69, 0, 0.7), 0 0 40px rgba(255, 215, 0, 0.3); }
        }

        .ach-emoji {
            font-size: 2rem;
            margin-bottom: 0.4rem;
        }
        .ach-name {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
        }
        .ach-desc {
            font-size: 0.72rem;
            color: var(--text-muted);
            line-height: 1.3;
        }
        .ach-tier {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            background: rgba(0,0,0,0.3);
        }
        .ach-tier.bronze { color: var(--bronze); }
        .ach-tier.silver { color: var(--silver); }
        .ach-tier.gold { color: var(--gold); }
        .ach-tier.diamond { color: var(--diamond); }
        .ach-tier.mythic { color: var(--mythic); }
        .ach-tier.transcendent { color: var(--transcendent); }

        .ach-date {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 0.4rem;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .achievement-card.unlocked:hover .ach-date {
            opacity: 1;
        }

        /* Shadow achievement special style */
        .achievement-card.locked.shadow {
            border-style: dashed;
            border-color: rgba(255, 215, 0, 0.15);
        }
        .achievement-card.unlocked.shadow::after {
            content: '🔓 SECRET';
            position: absolute;
            bottom: 4px;
            right: 6px;
            font-size: 0.55rem;
            color: var(--gold);
            opacity: 0.7;
        }

        /* Toast notifications */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .toast {
            background: var(--card-bg);
            border: 2px solid var(--gold);
            border-radius: 10px;
            padding: 1rem 1.5rem;
            padding-right: 2.6rem;
            box-shadow: 0 8px 32px rgba(255, 215, 0, 0.3);
            animation: toast-in 0.5s ease forwards;
            max-width: 320px;
            position: relative;
        }
        .toast.dismissing {
            animation: toast-out 0.35s ease forwards;
        }
        .toast-close {
            position: absolute;
            top: 0.5rem;
            right: 0.6rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
            line-height: 1;
            padding: 0.2rem 0.3rem;
            border-radius: 4px;
            transition: color 0.15s;
        }
        .toast-close:hover { color: var(--text); }
        .toast-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--gold);
            letter-spacing: 0.1em;
            margin-bottom: 0.3rem;
        }
        .toast-content {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .toast-emoji { font-size: 1.5rem; }
        .toast-text .toast-name {
            font-weight: 700;
            font-size: 0.9rem;
        }
        .toast-text .toast-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        @keyframes toast-in {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes toast-out {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(100px); }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
                padding: 0.5rem;
            }
            .achievement-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
            .stats-bar {
                padding: 1rem;
            }
            .achievements-section {
                padding: 1rem;
            }
        }
    </style>
</head>

            }

            // Unlocked card
            const dateStr = a.unlock_date ? `Unlocked: ${a.unlock_date}` : '';
            const classes = [
                'achievement-card', 'unlocked', a.tier,
                isShadow ? 'shadow' : '',
            ].filter(Boolean).join(' ');

            return `<div class="${classes}" title="${a.description}">
                <span class="ach-tier ${a.tier}">${a.tier}</span>
                <div class="ach-emoji">${a.emoji}</div>
                <div class="ach-name">${a.name}</div>
                <div class="ach-desc">${a.description}</div>
                ${dateStr ? `<div class="ach-date">${dateStr}</div>` : ''}
            </div>`;
        }).join('');
    }

    (function renderFilters() {
        const container = document.getElementById('category-filters');
        const categories = ['All', ...categoryOrder];
        container.innerHTML = categories.map(c => {
            const active = c === activeFilter ? 'active' : '';
            return `<button class="filter-btn ${active}" data-cat="${c}">${c}</button>`;
        }).join('');

        container.addEventListener('click', (e) => {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;
            activeFilter = btn.dataset.cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderAchievements(activeFilter);
        });
    })();

    renderAchievements('All');

    // ---- Toast Notifications ----
    (function showToasts() {
        if (!NEWLY_UNLOCKED || NEWLY_UNLOCKED.length === 0) return;

        // Check localStorage for already-seen toasts
        const seenKey = 'thesis-dashboard-seen-achievements';
        let seen = [];
        try { seen = JSON.parse(localStorage.getItem(seenKey) || '[]'); } catch(e) {}

        const unseen = NEWLY_UNLOCKED.filter(id => !seen.includes(id));
        if (unseen.length === 0) return;

        const container = document.getElementById('toast-container');

        unseen.forEach((achId, idx) => {
            const ach = ACHIEVEMENTS[achId];
            if (!ach) return;

            setTimeout(() => {
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerHTML = `
                    <button class="toast-close" title="Dismiss">✕</button>
                    <div class="toast-title">🏆 Achievement Unlocked!</div>
                    <div class="toast-content">
                        <span class="toast-emoji">${ach.emoji}</span>
                        <div class="toast-text">
                            <div class="toast-name">${ach.name}</div>
                            <div class="toast-desc">${ach.description}</div>
                        </div>
                    </div>
                `;
                container.appendChild(toast);

                // Dismiss only on close button click
                toast.querySelector('.toast-close').addEventListener('click', () => {
                    toast.classList.add('dismissing');
                    setTimeout(() => toast.remove(), 380);
                });
            }, idx * 800);
        });

        // Mark as seen
        seen.push(...unseen);
        try { localStorage.setItem(seenKey, JSON.stringify(seen)); } catch(e) {}
    })();

    // ---- Make Plotly charts responsive ----
    window.addEventListener('resize', () => {
        document.querySelectorAll('.js-plotly-plot').forEach(plot => {
            Plotly.Plots.resize(plot);
        });
    });

    // Trigger initial resize for proper sizing
    setTimeout(() => {
        document.querySelectorAll('.js-plotly-plot').forEach(plot => {
            Plotly.Plots.resize(plot);
        });
    }, 100);
</script>

</body>
